<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Laidani Repair - Suivi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.spinner{width:40px;height:40px;border:3px solid #30363d;border-top-color:#00bcd4;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.container{max-width:600px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 20px 20px;background:linear-gradient(135deg,#0d1117,#161b22);border-bottom:2px solid #00bcd4}
.header h1{font-size:22px;font-weight:800;letter-spacing:1px;color:#00bcd4}
.header-sub{font-size:13px;color:#8b949e;margin-top:2px}
.banner{padding:14px 20px;border-radius:10px;text-align:center;margin:16px 0;font-weight:600;font-size:14px}
.banner.danger{background:#f8514920;border:1px solid #f8514940;color:#f85149}
.progress-bar{display:flex;justify-content:space-between;margin:24px 0;position:relative}
.progress-bar::before{content:"";position:absolute;top:14px;left:10%;right:10%;height:2px;background:#30363d;z-index:0}
.step{display:flex;flex-direction:column;align-items:center;z-index:1;flex:1}
.step-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;background:#21262d;color:#8b949e;border:2px solid #30363d}
.step.done .step-icon{background:#3fb950;color:#fff;border-color:#3fb950}
.step.active .step-icon{background:#00bcd4;color:#0d1117;border-color:#00bcd4;box-shadow:0 0 12px #00bcd460}
.step-label{font-size:10px;color:#8b949e;margin-top:6px;text-align:center;max-width:60px}
.step.done .step-label{color:#3fb950}.step.active .step-label{color:#00bcd4;font-weight:600}
.status-badge{text-align:center;padding:10px 20px;border-radius:20px;font-weight:bold;font-size:15px;margin:8px auto 16px;display:inline-block;width:100%}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:#00bcd4;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #30363d40;font-size:14px}
.info-row:last-child{border-bottom:none}
.info-label{color:#8b949e;font-size:13px}
.timeline{padding-left:8px}
.timeline-item{display:flex;gap:12px;padding-bottom:16px;position:relative}
.timeline-item::before{content:"";position:absolute;left:7px;top:28px;bottom:0;width:2px;background:#30363d}
.timeline-item:last-child::before{display:none}
.timeline-dot{width:16px;height:16px;border-radius:50%;background:#00bcd4;flex-shrink:0;margin-top:3px}
.timeline-content{flex:1}
.timeline-title{font-weight:600;font-size:14px;color:#e6edf3}
.timeline-date{font-size:11px;color:#8b949e;margin-top:2px}
.timeline-notes{font-size:12px;color:#8b949e;margin-top:4px;background:#0d1117;padding:6px 10px;border-radius:6px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
@media(min-width:400px){.actions{grid-template-columns:repeat(4,1fr)}}
.btn{display:block;text-align:center;padding:12px 8px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:inherit;color:#e6edf3}
.btn.action{background:#161b22;border:1px solid #30363d}.btn.action:hover{background:#21262d}
.btn.primary{background:#00bcd4;color:#0d1117;font-weight:700;width:100%}
.btn.primary:hover{background:#00acc1}
.star-btn{background:none;border:none;font-size:32px;cursor:pointer;color:#30363d;padding:0 4px;transition:color .15s}
.star-btn.active,.star-btn:hover{color:#d29922}
textarea{width:100%;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:10px;font-family:inherit;resize:vertical}
textarea:focus{outline:none;border-color:#00bcd4}
.footer{text-align:center;padding:24px;color:#8b949e;font-size:13px;border-top:1px solid #00bcd440;margin-top:24px}
</style>
</head>
<body>
<div id="app"><div class="spinner"></div></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://igxpwxfruasfpvfagbaw.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlneHB3eGZydWFzZnB2ZmFnYmF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MzY5MzEsImV4cCI6MjA4ODUxMjkzMX0.sp6Cx1pzaQuaZxhxTtGZJZa7FUUAmL9z0jGhrTqCq0E";
const SHOP_NAME = "LAIDANI REPAIR";
const SHOP_PHONE = "0550000000";
const SHOP_MAPS = "https://maps.google.com";

const supabase = createClient(SUPABASE_URL, ANON_KEY);
const qr = new URLSearchParams(location.search).get("qr");
const app = document.getElementById("app");

const EVENTS = {
  status_change:"Changement de statut",quote_generated:"Devis genere",quote_sent:"Devis envoye",
  qc_result:"Controle qualite",part_added:"Piece ajoutee",handover_confirmed:"Remise confirmee",
  warranty_claim_opened:"Reclamation garantie",warranty_claim_status:"Statut reclamation",
  refund_processed:"Remboursement",refund_partial:"Remboursement partiel"
};

function fd(iso, short) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR", short ? {day:"numeric",month:"long",year:"numeric"} : {day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

function statusLabel(s) {
  if (s==="Livré") return "Livré ✓";
  if (s==="Terminé") return "Prêt à récupérer ✓";
  if (s==="Annulé") return "Annulé ✗";
  return "En attente";
}
function statusColor(s) {
  if (s==="Livré") return "#3fb950";
  if (s==="Terminé") return "#00bcd4";
  if (s==="Annulé") return "#f85149";
  return "#d29922";
}
function statusStep(s) {
  if (s==="Livré") return 4;
  if (s==="Terminé") return 3;
  if (s==="Annulé") return -1;
  return 1;
}

async function load() {
  if (!qr) { app.innerHTML = '<p style="color:#f85149;text-align:center;padding:40px">QR manquant</p>'; return; }

  try {
    // Try Edge Function first (service_role bypasses RLS)
    const fnResp = await fetch(`https://igxpwxfruasfpvfagbaw.supabase.co/functions/v1/track-v2?qr=${encodeURIComponent(qr)}`);
    
    if (fnResp.ok) {
      // Edge function returned HTML or JSON with data
      const text = await fnResp.text();
      if (text.startsWith("<!DOCTYPE") || text.startsWith("<html")) {
        document.open(); document.write(text); document.close(); return;
      }
    }

    // Fallback: query directly via Supabase client (needs RLS policy)
    const { data, error } = await supabase
      .from("repair_tickets")
      .select("*,customers(full_name,phone_number),profiles!repair_tickets_worker_id_fkey(full_name),repair_parts(charged_price,quantity,part_status,products(product_name)),repair_ticket_events(event_type,notes,created_at)")
      .eq("qr_code_hash", qr)
      .order("created_at", { foreignTable: "repair_ticket_events", ascending: true })
      .single();

    if (error || !data) { app.innerHTML = '<p style="color:#f85149;text-align:center;padding:40px">Ticket introuvable</p>'; return; }
    if (!data.is_public_page_enabled) { app.innerHTML = '<div style="text-align:center;padding:60px 20px"><div style="font-size:48px">&#128274;</div><p style="color:#8b949e">Page non activee</p></div>'; return; }

    window.TICKET_ID = data.id;

    // Increment view counter
    fetch(`${SUPABASE_URL}/rest/v1/repair_tickets?id=eq.${data.id}`, {
      method:"PATCH",
      headers:{apikey:ANON_KEY,Authorization:`Bearer ${ANON_KEY}`,"Content-Type":"application/json",Prefer:"return=minimal"},
      body:JSON.stringify({public_page_views:(data.public_page_views??0)+1})
    });

    const c = data.customers;
    const tech = data.profiles;
    const parts = data.repair_parts ?? [];
    const events = data.repair_ticket_events ?? [];
    const s = data.status ?? "En attente";
    const showP = data.show_prices_on_public === true;
    const hidePhone = data.hide_phone_on_public === true;
    const hideTech = data.hide_technician_on_public === true;
    const hideHistory = data.hide_history_on_public === true;
    const message = data.public_page_message || "";
    const wd = data.warranty_days ?? 0;
    const views = (data.public_page_views ?? 0) + 1;
    const step = statusStep(s);
    const sc = statusColor(s);
    const sl = statusLabel(s);
    const dev = [data.device_brand, data.device_name].filter(Boolean).join(" ") || "Non specifie";

    const progressBar = s === "Annulé"
      ? '<div class="banner danger"><span>Cette reparation a ete annulee</span></div>'
      : ["Reçu","En reparation","Terminé","Livré"].map((l,i) => {
          const done = i+1 <= step, active = i+1 === step;
          return `<div class="step${done?" done":""}${active?" active":""}"><div class="step-icon">${done?"✓":i+1}</div><div class="step-label">${l}</div></div>`;
        }).join("");

    const allParts = parts.length ? parts : [];
    const showPrices = showP;

    let html = `<div class="container">
      <div class="header"><h1>${SHOP_NAME}</h1><p class="header-sub">Suivi de reparation</p></div>
      ${message ? `<div class="banner" style="background:#00bcd420;border:1px solid #00bcd440;color:#00bcd4;margin-bottom:16px">${message}</div>` : ""}
      <div class="progress-bar">${progressBar}</div>
      <div class="status-badge" style="background:${sc}20;border:1px solid ${sc}40;color:${sc}">${sl}</div>
      <div class="card">
        <h2 class="card-title">Client</h2>
        <div class="info-row"><span class="info-label">Nom</span><span>${c?.full_name ?? data.client_name_temp ?? "Inconnu"}</span></div>
        ${!hidePhone ? `<div class="info-row"><span class="info-label">Telephone</span><span>${c?.phone_number ?? data.client_phone_temp ?? ""}</span></div>` : ""}
        <h2 class="card-title" style="margin-top:16px">Appareil</h2>
        <div class="info-row"><span class="info-label">Modele</span><span>${dev}</span></div>
        <div class="info-row"><span class="info-label">Probleme</span><span>${data.issue_description ?? data.pre_diagnostic ?? "Non specifie"}</span></div>
        ${!hideTech ? `<div class="info-row"><span class="info-label">Technicien</span><span>${tech?.full_name ?? "En cours d'assignation"}</span></div>` : ""}
        <div class="info-row"><span class="info-label">Depose le</span><span>${fd(data.created_at, true)}</span></div>
        ${data.estimated_completion_date ? `<div class="info-row"><span class="info-label">Livraison prevue</span><span>${fd(data.estimated_completion_date, true)}</span></div>` : ""}
        ${data.final_cost > 0 ? (() => {
          const ps = data.payment_status ?? "Non payé";
          const fc = data.final_cost ?? 0;
          const adv = data.advance_payment ?? 0;
          const paid = data.paid_amount ?? 0;
          const rest = Math.max(0, fc - adv - paid);
          const sc = ps === "Payé" ? "#3fb950" : ps === "Remboursé" ? "#f85149" : ps === "Avance" ? "#d29922" : "#8b949e";
          const sl = ps === "Payé" ? "✅ Payé" : ps === "Remboursé" ? "↩ Remboursé" : ps === "Avance" ? "⚠ Avance" : "⏳ Non payé";
          let rows = `<h2 class="card-title" style="margin-top:16px">Paiement</h2>
          <div class="info-row"><span class="info-label">Statut</span><span style="color:${sc};font-weight:bold">${sl}</span></div>
          <div class="info-row"><span class="info-label">Total</span><span style="color:#00bcd4;font-weight:bold;font-size:18px">${fc} DA</span></div>`;
          if (adv > 0 && ps !== "Remboursé") rows += `<div class="info-row"><span class="info-label">Avance</span><span style="color:#d29922">${adv} DA</span></div>`;
          if (paid > 0 && paid !== adv && ps !== "Remboursé") rows += `<div class="info-row"><span class="info-label">Payé</span><span style="color:#3fb950">${paid} DA</span></div>`;
          if (rest > 0 && ps !== "Remboursé") rows += `<div class="info-row"><span class="info-label">Reste à payer</span><span style="color:#f85149;font-weight:bold">${rest} DA</span></div>`;
          return rows;
        })() : ""}
      </div>`;

    if (events.length && !hideHistory) {
      html += `<div class="card"><h2 class="card-title">Historique</h2><div class="timeline">${
        events.map(e => `<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-title">${EVENTS[e.event_type] ?? e.event_type}</div><div class="timeline-date">${fd(e.created_at)}</div>${e.notes ? `<div class="timeline-notes">${e.notes}</div>` : ""}</div></div>`).join("")
      }</div></div>`;
    }

    if (allParts.length) {
      html += `<div class="card"><h2 class="card-title">Pieces remplacees</h2>${
        allParts.map(p => `<div class="info-row"><span>${p.products?.product_name ?? "Piece"}</span></div>`).join("")
      }</div>`;
    }

    if (wd > 0) {
      const delivered = s === "Livré";
      html += `<div class="card" style="border-left:3px solid #3fb950"><h2 class="card-title" style="color:#3fb950">Garantie</h2><p style="color:#3fb950;font-weight:bold;font-size:18px">${wd} jours${delivered ? "" : " (apres livraison)"}</p>${data.warranty_expires_at ? `<p style="color:#8b949e;font-size:13px">Expire le ${fd(data.warranty_expires_at, true)}</p>` : ""}</div>`;
    }

    if (s === "Livré") {
      html += `<div class="card" id="rating-section"><h2 class="card-title">Votre avis</h2><div id="stars" style="margin:12px 0">${
        [1,2,3,4,5].map(n => `<button class="star-btn" onclick="setRating(${n})">☆</button>`).join("")
      }</div><textarea id="comment" placeholder="Votre commentaire..." rows="3"></textarea><button class="btn primary" onclick="submitFeedback()" style="margin-top:12px">Envoyer</button><div id="feedback-msg" style="margin-top:8px;font-size:13px"></div></div>`;
    }

    html += `<div class="actions">
      <a href="tel:${SHOP_PHONE}" class="btn action">Appeler</a>
      <a href="https://wa.me/${SHOP_PHONE}" target="_blank" class="btn action">WhatsApp</a>
      <a href="${SHOP_MAPS}" target="_blank" class="btn action">Carte</a>
      <button class="btn action" onclick="sharePage()">Partager</button>
    </div>
    <div class="footer">
      <p>${SHOP_NAME}</p>
      <p style="font-size:11px;color:#8b949e">Propulse par Laidani Repair System</p>
      <p style="font-size:10px;color:#8b949e">Vues: ${views}</p>
    </div></div>`;

    app.innerHTML = html;

    supabase.channel("ticket-updates")
      .on("postgres_changes", {event:"UPDATE",schema:"public",table:"repair_tickets",filter:"id=eq."+data.id}, () => location.reload())
      .subscribe();

  } catch(e) {
    app.innerHTML = `<p style="color:#f85149;text-align:center;padding:40px">Erreur: ${e.message}</p>`;
  }
}

let _rating = 0;
window.setRating = function(n) {
  _rating = n;
  document.querySelectorAll(".star-btn").forEach(function(b,i) { b.textContent = i < n ? "★" : "☆"; });
};
window.submitFeedback = async function() {
  var c = document.getElementById("comment");
  var m = document.getElementById("feedback-msg");
  var comment = c ? c.value : "";
  if (!_rating) { m.innerHTML = '<span style="color:#f85149">Selectionnez une note</span>'; return; }
  m.innerHTML = '<span style="color:#8b949e">Envoi...</span>';
  try {
    var r = await fetch(SUPABASE_URL + "/rest/v1/customer_feedback", {
      method:"POST",
      headers:{apikey:ANON_KEY,Authorization:"Bearer "+ANON_KEY,"Content-Type":"application/json",Prefer:"return=minimal"},
      body:JSON.stringify({ticket_id:window.TICKET_ID,rating:_rating,comment:comment})
    });
    if (r.ok) {
      var s = document.getElementById("rating-section");
      if (s) s.innerHTML = '<div style="text-align:center;padding:20px"><p style="color:#3fb950;margin-top:8px">Avis envoye, merci !</p></div>';
    } else {
      m.innerHTML = '<span style="color:#f85149">Erreur</span>';
    }
  } catch(e) {
    m.innerHTML = '<span style="color:#f85149">Erreur reseau</span>';
  }
};
window.sharePage = function() {
  if (navigator.share) {
    navigator.share({title:"Suivi de reparation",url:location.href});
  } else {
    navigator.clipboard.writeText(location.href).then(function() { alert("Lien copie !"); });
  }
};

load();
</script>
</body>
</html>
