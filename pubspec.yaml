name: laidani_repair
description: Système ERP/POS pour atelier de réparation téléphonique - LaidaniRepair
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^13.2.4

  # Fonts & UI
  google_fonts: ^6.2.1

  # QR Code Generation (Step C - Repairs)
  qr_flutter: ^4.1.0
  fl_chart: ^0.69.2
  mobile_scanner: ^6.0.2
  image_picker: ^1.0.7
  pdf: ^3.11.1
  printing: ^5.13.4

  url_launcher: ^6.3.1
  http: ^1.2.0
  flutter_localizations:
    sdk: flutter
  csv: ^6.0.0
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  window_manager: ^0.5.1
  shared_preferences: ^2.3.4
  crypto: ^3.0.7
  encrypt: ^5.0.3
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.1.0
  file_picker: ^8.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/l10n/
    - .env
